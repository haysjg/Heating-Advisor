version: "3.9"

services:
  heating-advisor:
    build: .
    container_name: heating-advisor
    restart: unless-stopped
    ports:
      - "8888:5000"   # Port 5000 et 5001 occupés par nginx sur le NAS JG
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./data:/app/data              # Persistance de config_override.json
    # - ./config.py:/app/config.py   # Décommentez pour éditer la config sans rebuild
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Accès au NAS depuis le container (IP stable)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # 10 Mo par fichier de log
        max-file: "5"     # 5 fichiers max → 50 Mo total
